services:
  postgres:
    image: postgres:16-alpine
    container_name: opkelogist-postgres
    restart: always
    ports:
      - "1030:5432"
    environment:
      POSTGRES_USER: kamal
      POSTGRES_PASSWORD: kamalov-opkelogist-crm
      POSTGRES_DB: opkelogist
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: opkelogist-redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
